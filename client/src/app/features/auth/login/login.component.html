<div class="auth-page">
  <div class="auth-card">

    <div class="auth-brand">
      <div class="brand-icon">
        <span class="icon"><svg-icon name="bolt" [size]="22" /></span>
      </div>
      <span>WebhookForge</span>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your account to continue</p>

    @if (error()) {
      <div class="alert alert-error mb-3">
        <span class="icon"><svg-icon name="alertCircle" [size]="14" /></span>
        {{ error() }}
      </div>
    }

    <form (ngSubmit)="submit()" #f="ngForm" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" class="form-control" type="email" placeholder="you@example.com"
               [(ngModel)]="email" name="email" required autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" class="form-control" type="password" placeholder="••••••••"
               [(ngModel)]="password" name="password" required autocomplete="current-password" />
      </div>

      <button type="submit" class="btn btn-primary w-full" [disabled]="loading() || f.invalid">
        @if (loading()) {
          <span class="btn-spinner"></span> Signing in…
        } @else {
          Sign in
        }
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a routerLink="/register">Create one</a>
    </p>

  </div>
</div>
